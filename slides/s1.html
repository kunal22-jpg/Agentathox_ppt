<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a;
        }
        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #0f172a; /* Slate 900 */
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        /* Background decorative shapes */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        .blob-1 {
            width: 500px;
            height: 500px;
            background-color: rgba(59, 130, 246, 0.15); /* Blue */
            top: -100px;
            right: -100px;
        }
        .blob-2 {
            width: 600px;
            height: 600px;
            background-color: rgba(16, 185, 129, 0.1); /* Emerald */
            bottom: -150px;
            left: -150px;
        }
        .blob-3 {
            width: 300px;
            height: 300px;
            background-color: rgba(139, 92, 246, 0.1); /* Violet */
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .content-wrapper {
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 4rem;
        }

        .title-text {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
        }

        .pill-badge {
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
